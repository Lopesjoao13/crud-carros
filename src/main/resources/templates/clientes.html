<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex flex-col p-8">
<div th:replace="~{fragments :: navbar}"></div>

<div>
    <div class="flex flex-row justify-between items-center">
        <h1 class="text-2xl font-bold">👥 Clientes Cadastrados</h1>
        <a href="/clientes/novo" class="btn btn-neutral">Novo Cliente</a>
    </div>

    <table class="table mt-4 shadow-xs">
        <thead>
        <tr>
            <th>#</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${clientes}" class="hover:bg-base-300">
            <td th:text="${c.id}">1</td>
            <td th:text="${c.nome}">Nome</td>
            <td th:text="${c.cpf}">000.000.000-00</td>
            <td>
                <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-outline btn-sm">Editar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
